<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neon Snake</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #05060a;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      color: #cfd3f0;
      overflow: hidden;
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0;
    }

    .hud {
      position: fixed;
      left: 20px;
      top: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      backdrop-filter: blur(6px) saturate(140%);
      background: rgba(15, 18, 28, 0.5);
      border: 1px solid rgba(120, 140, 255, 0.16);
      color: #e8ecff;
      font-weight: 600;
      letter-spacing: 0.2px;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.4);
      user-select: none;
    }

    .hud .small {
      display: block;
      opacity: 0.7;
      font-weight: 500;
      font-size: 12px;
      margin-top: 2px;
    }

    .centerOverlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .card {
      min-width: 320px;
      text-align: center;
      border-radius: 16px;
      padding: 22px 26px;
      backdrop-filter: blur(10px) saturate(160%);
      background: radial-gradient(1200px 800px at 50% 0%, rgba(60, 70, 200, 0.15), rgba(0, 0, 0, 0)), rgba(15, 18, 28, 0.55);
      border: 1px solid rgba(120, 140, 255, 0.22);
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.5),
        inset 0 0 80px rgba(80, 100, 255, 0.06);
      pointer-events: auto;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin: 2px 0 10px 0;
      color: #f0f3ff;
      text-shadow:
        0 0 6px rgba(120, 180, 255, 0.6),
        0 0 26px rgba(120, 180, 255, 0.25);
    }

    .subtitle {
      opacity: 0.85;
      margin-bottom: 10px;
    }

    .kbd {
      display: inline-block;
      border-radius: 6px;
      padding: 4px 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(200, 210, 255, 0.18);
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #e6ebff;
      margin: 0 2px;
    }

    a {
      color: #bcd0ff;
      text-decoration: none;
      border-bottom: 1px dashed rgba(188, 208, 255, 0.4);
    }
  </style>
</head>

<body>
  <canvas id="game"></canvas>
  <div class="hud" id="hud">
    Score: <span id="score">0</span>
    <span class="small">Arrows/WASD to move • P to pause • Space to restart</span>
  </div>
  <div class="centerOverlay" id="overlay" style="display:none;">
    <div class="card">
      <div class="title" id="overlayTitle">Game Over</div>
      <div class="subtitle" id="overlaySubtitle">Press <span class="kbd">Space</span> to play again</div>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d', { alpha: false });
      const hudScore = document.getElementById('score');
      const overlay = document.getElementById('overlay');
      const overlayTitle = document.getElementById('overlayTitle');
      const overlaySubtitle = document.getElementById('overlaySubtitle');

      // Device pixel ratio scaling for crisp rendering
      let cssWidth = 0, cssHeight = 0, dpr = 1;

      function resize() {
        dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
        cssWidth = window.innerWidth;
        cssHeight = window.innerHeight;
        canvas.width = Math.round(cssWidth * dpr);
        canvas.height = Math.round(cssHeight * dpr);
        canvas.style.width = cssWidth + 'px';
        canvas.style.height = cssHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        game.recomputeLayout();
      }
      window.addEventListener('resize', resize);

      // Utility
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const rand = (a, b) => a + Math.random() * (b - a);
      const choice = arr => arr[(Math.random() * arr.length) | 0];

      // Game constants
      const GRID_SIZE = 28;     // cell size in pixels
      const FIELD_MARGIN = 40;  // margin around playfield
      const BASE_SPEED = 5;    // cells per second at start
      const SPEED_INC = 0.08;   // extra cells/sec per food
      const MAX_SPEED = 15;

      // Input
      const keysDown = new Set();
      const dirStack = [];
      window.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd', ' '].includes(k)) e.preventDefault();

        if (k === 'p') { game.togglePause(); return; }
        if (k === ' ') {
          if (game.state !== 'playing') game.reset();
          return;
        }
        if (['w', 'arrowup'].includes(k)) dirStack.push({ x: 0, y: -1 });
        if (['s', 'arrowdown'].includes(k)) dirStack.push({ x: 0, y: 1 });
        if (['a', 'arrowleft'].includes(k)) dirStack.push({ x: -1, y: 0 });
        if (['d', 'arrowright'].includes(k)) dirStack.push({ x: 1, y: 0 });
      });

      // Particles
      class Particle {
        constructor(x, y, color) {
          this.x = x; this.y = y;
          const a = rand(0, Math.PI * 2);
          const s = rand(60, 180);
          this.vx = Math.cos(a) * s;
          this.vy = Math.sin(a) * s;
          this.life = rand(0.5, 1.2);
          this.age = 0;
          this.size = rand(2, 5);
          this.hue = color;
        }
        update(dt) {
          this.age += dt;
          const drag = 0.98;
          this.vx *= drag;
          this.vy *= drag;
          this.vy += 200 * dt * 0.2; // slight gravity
          this.x += this.vx * dt;
          this.y += this.vy * dt;
        }
        render(ctx) {
          const t = clamp(this.age / this.life, 0, 1);
          const alpha = (1 - t) * 0.9;
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          ctx.shadowBlur = 20;
          ctx.shadowColor = `hsla(${this.hue},100%,60%,${alpha})`;
          const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
          grd.addColorStop(0, `hsla(${this.hue},100%,65%,${alpha})`);
          grd.addColorStop(1, `hsla(${this.hue},100%,50%,0)`);
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        get dead() { return this.age >= this.life; }
      }

      // Main Game
      const game = {
        state: 'menu', // 'playing' | 'dead' | 'menu' | 'paused'
        cols: 0, rows: 0,
        fieldLeft: 0, fieldTop: 0, fieldRight: 0, fieldBottom: 0, fieldWidth: 0, fieldHeight: 0,
        snake: [],
        dir: { x: 1, y: 0 },
        nextDir: { x: 1, y: 0 },
        progress: 0, // 0..1 animation between cells
        accumulator: 0,
        stepInterval: 1 / BASE_SPEED,
        speed: BASE_SPEED,
        grow: 0,
        food: { x: 0, y: 0, hue: 0, pulse: 0 },
        score: 0,
        particles: [],
        time: 0,
        glowPhase: 0,

        recomputeLayout() {
          const usableW = cssWidth - FIELD_MARGIN * 2;
          const usableH = cssHeight - FIELD_MARGIN * 2;
          this.cols = Math.max(10, Math.floor(usableW / GRID_SIZE));
          this.rows = Math.max(10, Math.floor(usableH / GRID_SIZE));
          this.fieldWidth = this.cols * GRID_SIZE;
          this.fieldHeight = this.rows * GRID_SIZE;
          this.fieldLeft = Math.floor((cssWidth - this.fieldWidth) / 2);
          this.fieldTop = Math.floor((cssHeight - this.fieldHeight) / 2);
          this.fieldRight = this.fieldLeft + this.fieldWidth;
          this.fieldBottom = this.fieldTop + this.fieldHeight;
        },

        reset() {
          this.recomputeLayout();
          this.state = 'playing';
          this.snake = [];
          const startX = (this.cols / 2) | 0, startY = (this.rows / 2) | 0;
          for (let i = 0; i < 6; i++) this.snake.push({ x: startX - i, y: startY });
          this.dir = { x: 1, y: 0 };
          this.nextDir = { x: 1, y: 0 };
          this.progress = 0;
          this.accumulator = 0;
          this.speed = BASE_SPEED;
          this.stepInterval = 1 / this.speed;
          this.grow = 0;
          this.score = 0;
          hudScore.textContent = '0';
          this.particles = [];
          this.time = 0;
          this.glowPhase = 0;
          this.spawnFood();
          overlay.style.display = 'none';
        },

        togglePause() {
          if (this.state === 'playing') { this.state = 'paused'; overlay.style.display = 'grid'; overlayTitle.textContent = 'Paused'; overlaySubtitle.innerHTML = 'Press <span class="kbd">P</span> to resume'; }
          else if (this.state === 'paused') { this.state = 'playing'; overlay.style.display = 'none'; }
        },

        spawnFood() {
          const empty = [];
          const occupied = new Set(this.snake.map(s => s.x + ',' + s.y));
          for (let y = 0; y < this.rows; y++) for (let x = 0; x < this.cols; x++) {
            const k = x + ',' + y;
            if (!occupied.has(k)) empty.push({ x, y });
          }
          const f = choice(empty) || { x: (Math.random() * this.cols) | 0, y: (Math.random() * this.rows) | 0 };
          this.food.x = f.x;
          this.food.y = f.y;
          this.food.hue = (this.score * 23 + 40) % 360;
          this.food.pulse = 0;
        },

        handleInput() {
          while (dirStack.length) {
            const d = dirStack.shift();
            if (d.x === -this.dir.x && d.y === -this.dir.y) continue;
            this.nextDir = d;
            break;
          }
        },

        step() {
          // apply queued direction on cell transition
          this.dir = this.nextDir;

          const head = this.snake[0];
          const nx = head.x + this.dir.x;
          const ny = head.y + this.dir.y;

          // Collisions
          if (nx < 0 || ny < 0 || nx >= this.cols || ny >= this.rows) {
            this.die();
            return;
          }
          for (let i = 0; i < this.snake.length; i++) {
            const s = this.snake[i];
            if (s.x === nx && s.y === ny) { this.die(); return; }
          }

          // Move
          this.snake.unshift({ x: nx, y: ny });
          if (this.grow > 0) {
            this.grow--;
          } else {
            this.snake.pop();
          }

          // Eat?
          if (nx === this.food.x && ny === this.food.y) {
            this.grow += 2;
            this.score += 10;
            hudScore.textContent = String(this.score);
            this.speed = clamp(this.speed + SPEED_INC, BASE_SPEED, MAX_SPEED);
            this.stepInterval = 1 / this.speed;
            // particles burst at food center
            const fx = this.fieldLeft + nx * GRID_SIZE + GRID_SIZE / 2;
            const fy = this.fieldTop + ny * GRID_SIZE + GRID_SIZE / 2;
            for (let i = 0; i < 50; i++) this.particles.push(new Particle(fx, fy, this.food.hue));
            this.spawnFood();
          }
        },

        die() {
          this.state = 'dead';
          overlay.style.display = 'grid';
          overlayTitle.textContent = 'Game Over';
          overlaySubtitle.innerHTML = 'Score: <b>' + this.score + '</b> • Press <span class="kbd">Space</span> to try again';
          // death particles along the snake
          const hue = (this.score * 17 + 220) % 360;
          for (let i = 0; i < this.snake.length; i += 2) {
            const s = this.snake[i];
            const x = this.fieldLeft + s.x * GRID_SIZE + GRID_SIZE / 2;
            const y = this.fieldTop + s.y * GRID_SIZE + GRID_SIZE / 2;
            for (let p = 0; p < 10; p++) this.particles.push(new Particle(x, y, hue));
          }
        },

        update(dt) {
          if (this.state !== 'playing') {
            // keep animating background and particles
            this.time += dt;
            this.food.pulse += dt;
            this.updateParticles(dt);
            return;
          }
          this.time += dt;
          this.glowPhase += dt * 0.7;
          this.food.pulse += dt;
          this.handleInput();

          // Fixed-step logic with interpolation
          this.accumulator += dt;
          const maxFrameSteps = 5;
          let steps = 0;
          while (this.accumulator >= this.stepInterval && steps < maxFrameSteps) {
            this.accumulator -= this.stepInterval;
            this.step();
            if (this.state !== 'playing') break;
            steps++;
          }
          this.progress = clamp(1 - (this.accumulator / this.stepInterval), 0, 1);

          this.updateParticles(dt);
        },

        updateParticles(dt) {
          for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.update(dt);
            if (p.dead) this.particles.splice(i, 1);
          }
          // cap
          if (this.particles.length > 600) this.particles.length = 600;
        },

        render() {
          // Clear
          ctx.fillStyle = '#05060a';
          ctx.fillRect(0, 0, cssWidth, cssHeight);

          // Background: animated neon grid + vignette
          this.renderBackground();

          // Food glow behind
          this.renderFood(true);

          // Snake glow pass
          this.renderSnake(true);

          // Food main
          this.renderFood(false);

          // Snake main pass
          this.renderSnake(false);

          // Particles
          this.renderParticles();

          // Frame vignette
          this.renderVignette();
        },

        renderBackground() {
          const t = this.time;
          // Animated aurora gradient
          const g = ctx.createLinearGradient(0, 0, cssWidth, cssHeight);
          const hueBase = (t * 8) % 360;
          g.addColorStop(0.0, `hsla(${(hueBase + 200) % 360}, 85%, 7%, 1)`);
          g.addColorStop(1.0, `hsla(${(hueBase + 260) % 360}, 85%, 6%, 1)`);
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, cssWidth, cssHeight);

          // Neon grid
          const lineAlpha = 0.08;
          ctx.save();
          ctx.translate(this.fieldLeft, this.fieldTop);

          // Scanline glow
          const glow = 8 + Math.sin(this.glowPhase) * 6;
          ctx.shadowBlur = glow;
          ctx.shadowColor = `rgba(120,180,255,0.18)`;
          ctx.strokeStyle = `rgba(170,200,255,${lineAlpha})`;
          ctx.lineWidth = 1;

          // vertical lines
          ctx.beginPath();
          for (let x = 0; x <= this.cols; x++) {
            ctx.moveTo(x * GRID_SIZE + 0.5, 0);
            ctx.lineTo(x * GRID_SIZE + 0.5, this.fieldHeight);
          }
          // horizontal lines
          for (let y = 0; y <= this.rows; y++) {
            ctx.moveTo(0, y * GRID_SIZE + 0.5);
            ctx.lineTo(this.fieldWidth, y * GRID_SIZE + 0.5);
          }
          ctx.stroke();
          ctx.restore();

          // Field border
          ctx.save();
          ctx.strokeStyle = 'rgba(180,200,255,0.25)';
          ctx.lineWidth = 2;
          ctx.shadowBlur = 22;
          ctx.shadowColor = 'rgba(120,180,255,0.35)';
          ctx.strokeRect(this.fieldLeft - 1, this.fieldTop - 1, this.fieldWidth + 2, this.fieldHeight + 2);
          ctx.restore();
        },

        renderSnake(isGlow) {
          if (this.snake.length === 0) return;

          const head = this.snake[0];
          const hx = head.x * GRID_SIZE + GRID_SIZE / 2;
          const hy = head.y * GRID_SIZE + GRID_SIZE / 2;
          const interpX = hx + this.dir.x * GRID_SIZE * (1 - this.progress);
          const interpY = hy + this.dir.y * GRID_SIZE * (1 - this.progress);

          ctx.save();
          ctx.translate(this.fieldLeft, this.fieldTop);

          const len = this.snake.length;
          const hueHead = (this.score * 3 + 190) % 360;
          const hueTail = (hueHead + 60) % 360;

          // Glow pass
          if (isGlow) {
            ctx.globalCompositeOperation = 'lighter';
            ctx.shadowBlur = 28;
            ctx.shadowColor = `hsla(${hueHead},100%,60%,0.7)`;
            ctx.strokeStyle = `hsla(${hueHead},100%,60%,0.18)`;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = GRID_SIZE * 0.9;
            ctx.beginPath();
            // Draw smooth polyline along segments
            let last = null;
            for (let i = 0; i < len; i++) {
              const s = this.snake[i];
              const cx = s.x * GRID_SIZE + GRID_SIZE / 2;
              const cy = s.y * GRID_SIZE + GRID_SIZE / 2;
              const px = (i === 0) ? interpX : cx;
              const py = (i === 0) ? interpY : cy;
              if (!last) { ctx.moveTo(px, py); last = { x: px, y: py }; continue; }
              ctx.lineTo(px, py);
              last = { x: px, y: py };
            }
            ctx.stroke();
            ctx.restore();
            return;
          }

          // Main pass
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.lineWidth = GRID_SIZE * 0.6;

          // Gradient along the path
          const headPx = interpX;
          const headPy = interpY;
          const tail = this.snake[len - 1];
          const tailPx = tail.x * GRID_SIZE + GRID_SIZE / 2;
          const tailPy = tail.y * GRID_SIZE + GRID_SIZE / 2;

          const grad = ctx.createLinearGradient(tailPx, tailPy, headPx, headPy);
          grad.addColorStop(0, `hsla(${hueTail}, 95%, 60%, 0.85)`);
          grad.addColorStop(1, `hsla(${hueHead}, 95%, 60%, 0.95)`);

          ctx.strokeStyle = grad;
          ctx.shadowBlur = 12;
          ctx.shadowColor = `hsla(${hueHead},100%,60%,0.6)`;

          ctx.beginPath();
          let last = null;
          for (let i = 0; i < len; i++) {
            const s = this.snake[i];
            const cx = s.x * GRID_SIZE + GRID_SIZE / 2;
            const cy = s.y * GRID_SIZE + GRID_SIZE / 2;
            const px = (i === 0) ? interpX : cx;
            const py = (i === 0) ? interpY : cy;
            if (!last) { ctx.moveTo(px, py); last = { x: px, y: py }; continue; }
            ctx.lineTo(px, py);
            last = { x: px, y: py };
          }
          ctx.stroke();

          // Head orb
          ctx.shadowBlur = 22;
          ctx.fillStyle = `hsla(${hueHead},100%,70%,0.9)`;
          ctx.beginPath();
          ctx.arc(headPx, headPy, GRID_SIZE * 0.28, 0, Math.PI * 2);
          ctx.fill();

          ctx.restore();
        },

        renderFood(isGlow) {
          const f = this.food;
          const cx = this.fieldLeft + f.x * GRID_SIZE + GRID_SIZE / 2;
          const cy = this.fieldTop + f.y * GRID_SIZE + GRID_SIZE / 2;
          const r = GRID_SIZE * (0.25 + Math.sin(this.food.pulse * 3) * 0.03);
          const hue = f.hue;

          if (isGlow) {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.shadowBlur = 30;
            ctx.shadowColor = `hsla(${hue},100%,60%,0.8)`;
            ctx.fillStyle = `hsla(${hue},100%,60%,0.22)`;
            ctx.beginPath();
            ctx.arc(cx, cy, r * 3.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            return;
          }

          ctx.save();
          const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.4);
          grd.addColorStop(0, `hsla(${hue},100%,68%,1)`);
          grd.addColorStop(1, `hsla(${hue},100%,40%,0)`);
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(cx, cy, r * 1.4, 0, Math.PI * 2);
          ctx.fill();

          // Orbiting sparks
          ctx.globalCompositeOperation = 'lighter';
          ctx.shadowBlur = 12;
          for (let i = 0; i < 6; i++) {
            const a = this.time * 2 + (i / 6) * Math.PI * 2;
            const rr = r * 1.9;
            const sx = cx + Math.cos(a) * rr;
            const sy = cy + Math.sin(a) * rr;
            ctx.fillStyle = `hsla(${hue},100%,70%,0.75)`;
            ctx.beginPath();
            ctx.arc(sx, sy, 2.8, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        },

        renderParticles() {
          for (const p of this.particles) p.render(ctx);
        },

        renderVignette() {
          const g = ctx.createRadialGradient(cssWidth / 2, cssHeight / 2, Math.min(cssWidth, cssHeight) / 2.2, cssWidth / 2, cssHeight / 2, Math.min(cssWidth, cssHeight) / 1.2);
          g.addColorStop(0, 'rgba(0,0,0,0)');
          g.addColorStop(1, 'rgba(0,0,0,0.5)');
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, cssWidth, cssHeight);
        }
      };

      // Main loop
      let lastT = 0;
      function frame(ts) {
        const t = ts / 1000;
        const dt = Math.min(0.033, Math.max(0.001, t - lastT || 0.016));
        lastT = t;

        game.update(dt);
        game.render();

        requestAnimationFrame(frame);
      }

      // Init
      resize();
      game.reset();
      requestAnimationFrame(frame);
    })();
  </script>
</body>

</html>
